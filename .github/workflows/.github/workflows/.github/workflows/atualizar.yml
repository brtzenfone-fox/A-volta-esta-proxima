A Volta Esta Proxima
Portal cristao protestante premium com curadoria de noticias globais sobre perseguicao, milagres, testemunhos, sinais dos tempos e documentarios.
Sobre
Site automatizado que reune e cura conteudo cristao de fontes confiaveis ao redor do mundo, com analise biblica e visual sofisticado.
Stack
	•	Python (scraper)
	•	HTML/CSS/JS estatico
	•	GitHub Pages (hospedagem gratuita)
	•	GitHub Actions (atualizacao automatica)
Arquivos
	•	scraper.py - script que gera o site
	•	index.html - site gerado (atualizado automaticamente)
	•	artigos.json - banco de artigos
	•	versiculos.json - lista de versiculos
	•	estudos.json - estudos diarios
	•	manifest.json + service-worker.js - PWA
	•	.github/workflows/atualizar.yml - automacao
Atualizacoes
O site se atualiza automaticamente 4x por dia via GitHub Actions.
